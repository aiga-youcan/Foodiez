<!doctype html>
<html lang="fr" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Foodiez SPA - Dashboard SaaS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              pending: "#f59e0b", // Amber
              accepted: "#3b82f6", // Blue
              completed: "#10b981", // Green
              rejected: "#ef4444", // Red
            },
          },
        },
      };
    </script>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      /* Animation fluide de transition entre les pages */
      .view-transition {
        animation: fadeIn 0.3s ease-in-out;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      /* Cacher la scrollbar pour un look plus clean */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
      }
      .dark ::-webkit-scrollbar-thumb {
        background: #475569;
      }
    </style>
  </head>
  <body
    class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-100 transition-colors duration-300 font-sans h-screen overflow-hidden flex"
  >
    <aside
      class="w-64 bg-white dark:bg-gray-800 shadow-xl z-20 flex flex-col hidden md:flex"
    >
      <div
        class="p-6 border-b border-gray-100 dark:border-gray-700 flex items-center gap-3"
      >
        <div
          class="w-10 h-10 bg-orange-500 rounded-xl flex items-center justify-center text-white text-xl shadow-lg shadow-orange-500/30"
        >
          <i class="fas fa-hamburger"></i>
        </div>
        <h1 class="text-2xl font-bold text-gray-800 dark:text-white">
          Foodiez
        </h1>
      </div>

      <nav class="flex-1 px-4 py-6 space-y-2">
        <button
          onclick="navigate('dashboard')"
          id="nav-dashboard"
          class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left transition-all hover:bg-gray-100 dark:hover:bg-gray-700 font-medium"
        >
          <i class="fas fa-chart-pie w-5"></i> Dashboard
        </button>
        <button
          onclick="navigate('orders')"
          id="nav-orders"
          class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left transition-all hover:bg-gray-100 dark:hover:bg-gray-700 font-medium"
        >
          <i class="fas fa-list-ul w-5"></i> Commandes
        </button>
        <button
          onclick="navigate('settings')"
          id="nav-settings"
          class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left transition-all hover:bg-gray-100 dark:hover:bg-gray-700 font-medium"
        >
          <i class="fas fa-cog w-5"></i> Paramètres
        </button>
      </nav>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden relative">
      <header
        class="md:hidden bg-white dark:bg-gray-800 shadow p-4 flex justify-between items-center z-10"
      >
        <h1 class="text-xl font-bold text-orange-500">
          <i class="fas fa-hamburger mr-2"></i>Foodiez
        </h1>
        <div class="flex gap-2">
          <button onclick="navigate('dashboard')" class="p-2 text-gray-500">
            <i class="fas fa-chart-pie"></i>
          </button>
          <button onclick="navigate('orders')" class="p-2 text-gray-500">
            <i class="fas fa-list-ul"></i>
          </button>
          <button onclick="navigate('settings')" class="p-2 text-gray-500">
            <i class="fas fa-cog"></i>
          </button>
        </div>
      </header>

      <div
        id="global-loader"
        class="absolute inset-0 bg-white/80 dark:bg-gray-900/80 z-30 flex justify-center items-center hidden backdrop-blur-sm transition-opacity"
      >
        <div class="flex flex-col items-center">
          <i
            class="fas fa-circle-notch fa-spin text-5xl text-orange-500 mb-4"
          ></i>
          <p class="font-medium">Chargement des données...</p>
        </div>
      </div>

      <div
        id="app-content"
        class="flex-1 overflow-y-auto p-4 md:p-8 view-transition"
      ></div>
    </main>

    <div
      id="toast-container"
      class="fixed bottom-5 right-5 flex flex-col gap-2 z-50"
    ></div>

    <script src="script.js"></script>
  </body>
</html>
