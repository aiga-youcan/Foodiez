<!doctype html>
<html lang="fr" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Foodiez — Gestion des Commandes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              pending: "#f59e0b",
              accepted: "#3b82f6",
              completed: "#10b981",
              rejected: "#ef4444",
            },
          },
        },
      };
    </script>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="main.css" />
  </head>

  <body
    class="bg-slate-900 text-slate-100 h-screen overflow-hidden flex font-[Outfit]"
  >
    <!-- ===== SIDEBAR ===== -->
    <aside class="w-64 glass-panel flex flex-col z-20 hidden md:flex shrink-0">
      <!-- Logo -->
      <div class="p-6 border-b border-white/10 flex items-center gap-3">
        <div
          class="w-10 h-10 bg-orange-500 rounded-xl flex items-center justify-center text-white text-xl shadow-lg shadow-orange-500/30"
        >
          <i class="fas fa-hamburger"></i>
        </div>
        <h1 id="brand-name" class="text-2xl font-bold text-white">Foodiez</h1>
      </div>

      <!-- Nav Links -->
      <nav class="flex-1 px-4 py-6 space-y-1">
        <button
          data-page="dashboard"
          class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left transition-all font-medium text-slate-400 hover:text-white hover:bg-slate-800/30"
        >
          <i class="fas fa-chart-pie w-5"></i> Dashboard
        </button>
        <button
          data-page="orders"
          class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left transition-all font-medium text-slate-400 hover:text-white hover:bg-slate-800/30"
        >
          <i class="fas fa-list-ul w-5"></i> Commandes
        </button>
        <button
          data-page="new-order"
          class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left transition-all font-medium text-slate-400 hover:text-white hover:bg-slate-800/30"
        >
          <i class="fas fa-plus-circle w-5"></i> Nouvelle Commande
        </button>
      </nav>

      <!-- Footer -->
      <div class="p-4 border-t border-white/10">
        <p id="footer-info" class="text-xs text-slate-500 text-center">
          Foodiez | contact@foodiez.com
        </p>
      </div>
    </aside>

    <!-- ===== MAIN ===== -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden relative">
      <!-- Mobile Header -->
      <header
        class="md:hidden glass-panel border-b border-white/10 p-4 flex justify-between items-center z-10 shrink-0"
      >
        <h1 class="text-xl font-bold text-orange-500">
          <i class="fas fa-hamburger mr-2"></i>Foodiez
        </h1>
        <div class="flex gap-1">
          <button
            data-page="dashboard"
            class="nav-btn p-2 text-slate-400 hover:text-white rounded-lg"
          >
            <i class="fas fa-chart-pie"></i>
          </button>
          <button
            data-page="orders"
            class="nav-btn p-2 text-slate-400 hover:text-white rounded-lg"
          >
            <i class="fas fa-list-ul"></i>
          </button>
          <button
            data-page="new-order"
            class="nav-btn p-2 text-slate-400 hover:text-white rounded-lg"
          >
            <i class="fas fa-plus-circle"></i>
          </button>
        </div>
      </header>

      <!-- Global Loader -->
      <div
        id="global-loader"
        class="absolute inset-0 bg-slate-900/80 z-30 flex justify-center items-center hidden backdrop-blur-sm"
      >
        <div class="flex flex-col items-center gap-4">
          <i class="fas fa-circle-notch fa-spin text-5xl text-orange-500"></i>
          <p class="font-medium text-slate-300">Chargement...</p>
        </div>
      </div>

      <!-- Error Banner -->
      <div
        id="error-banner"
        class="hidden mx-4 mt-4 p-4 bg-red-500/20 border border-red-500/40 rounded-xl text-red-300 flex items-center gap-3 shrink-0"
      >
        <i class="fas fa-exclamation-triangle"></i>
        <span id="error-text">Erreur de connexion</span>
        <button
          onclick="
            document.getElementById('error-banner').classList.add('hidden')
          "
          class="ml-auto text-red-300 hover:text-white"
        >
          <i class="fas fa-times"></i>
        </button>
      </div>

      <!-- App Content -->
      <div id="app-content" class="flex-1 overflow-y-auto p-4 md:p-8">
        <!-- ===== PAGE: DASHBOARD ===== -->
        <section id="page-dashboard" class="page-section hidden fade-in">
          <div class="mb-8">
            <p
              class="text-slate-500 uppercase text-xs font-semibold tracking-widest mb-1"
            >
              Vue d'ensemble
            </p>
            <h2 class="text-3xl font-bold text-white">Tableau de Bord</h2>
          </div>

          <!-- Stats Cards -->
          <div
            id="dashboard-stats"
            class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4 mb-8"
          >
            <!-- Rendered by JS -->
          </div>

          <!-- Recent Orders -->
          <div class="glass-card rounded-xl p-6">
            <h3
              class="text-lg font-semibold text-white mb-4 flex items-center gap-2"
            >
              <i class="fas fa-clock text-orange-400"></i> Commandes Récentes
            </h3>
            <div id="recent-orders" class="space-y-3">
              <!-- Rendered by JS -->
            </div>
          </div>
        </section>

        <!-- ===== PAGE: ORDERS ===== -->
        <section id="page-orders" class="page-section hidden fade-in">
          <div class="mb-6">
            <p
              class="text-slate-500 uppercase text-xs font-semibold tracking-widest mb-1"
            >
              Gestion
            </p>
            <h2 class="text-3xl font-bold text-white">Commandes</h2>
          </div>

          <!-- Filters -->
          <div class="flex flex-wrap gap-2 mb-6">
            <button
              data-filter="all"
              class="filter-btn px-4 py-2 rounded-full text-sm font-medium border border-slate-700 bg-slate-800/50 text-slate-400 transition-all hover:text-white"
            >
              Toutes
            </button>
            <button
              data-filter="pending"
              class="filter-btn px-4 py-2 rounded-full text-sm font-medium border border-slate-700 bg-slate-800/50 text-slate-400 transition-all hover:text-white"
            >
              En attente
            </button>
            <button
              data-filter="accepted"
              class="filter-btn px-4 py-2 rounded-full text-sm font-medium border border-slate-700 bg-slate-800/50 text-slate-400 transition-all hover:text-white"
            >
              Acceptées
            </button>
            <button
              data-filter="completed"
              class="filter-btn px-4 py-2 rounded-full text-sm font-medium border border-slate-700 bg-slate-800/50 text-slate-400 transition-all hover:text-white"
            >
              Terminées
            </button>
            <button
              data-filter="rejected"
              class="filter-btn px-4 py-2 rounded-full text-sm font-medium border border-slate-700 bg-slate-800/50 text-slate-400 transition-all hover:text-white"
            >
              Rejetées
            </button>
          </div>

          <!-- Orders Grid -->
          <div
            id="orders-list"
            class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4"
          >
            <!-- Rendered by JS -->
          </div>
        </section>

        <!-- ===== PAGE: NEW ORDER ===== -->
        <section id="page-new-order" class="page-section hidden fade-in">
          <div class="mb-6">
            <p
              class="text-slate-500 uppercase text-xs font-semibold tracking-widest mb-1"
            >
              Créer
            </p>
            <h2 class="text-3xl font-bold text-white">Nouvelle Commande</h2>
          </div>

          <div class="max-w-lg">
            <div class="glass-card rounded-xl p-6">
              <form id="order-form" class="space-y-5">
                <div>
                  <label class="block text-sm font-medium text-slate-300 mb-2"
                    >Nom du client</label
                  >
                  <input
                    type="text"
                    id="form-name"
                    required
                    placeholder="ex: Ahmed"
                    class="w-full p-3 rounded-lg bg-slate-800 border border-slate-700 focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none transition text-white placeholder-slate-500"
                  />
                </div>
                <div>
                  <label class="block text-sm font-medium text-slate-300 mb-2"
                    >Items
                    <span class="text-slate-500 text-xs"
                      >(séparés par virgule)</span
                    ></label
                  >
                  <input
                    type="text"
                    id="form-items"
                    required
                    placeholder="ex: Pizza, Soda, Burger"
                    class="w-full p-3 rounded-lg bg-slate-800 border border-slate-700 focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none transition text-white placeholder-slate-500"
                  />
                </div>
                <div>
                  <label class="block text-sm font-medium text-slate-300 mb-2"
                    >Prix total (MAD)</label
                  >
                  <input
                    type="number"
                    id="form-price"
                    required
                    min="1"
                    placeholder="ex: 120"
                    class="w-full p-3 rounded-lg bg-slate-800 border border-slate-700 focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none transition text-white placeholder-slate-500"
                  />
                </div>
                <div class="flex gap-3 pt-2">
                  <button
                    type="submit"
                    class="flex-1 bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 px-6 rounded-lg transition flex justify-center items-center gap-2"
                  >
                    <i class="fas fa-plus-circle"></i> Ajouter
                  </button>
                  <button
                    type="reset"
                    class="px-6 py-3 rounded-lg border border-slate-700 text-slate-400 hover:text-white hover:border-slate-500 transition font-medium"
                  >
                    Reset
                  </button>
                </div>
              </form>
            </div>
          </div>
        </section>
      </div>
      <!-- end app-content -->
    </main>

    <!-- Toast Container -->
    <div
      id="toast-container"
      class="fixed bottom-5 right-5 flex flex-col gap-2 z-50"
    ></div>

    <!-- Scripts — ordre important -->
    <script src="state.js"></script>
    <script src="utils.js"></script>
    <script src="api.js"></script>
    <script src="ui.js"></script>
    <script src="events.js"></script>
    <script src="app.js"></script>
  </body>
</html>
