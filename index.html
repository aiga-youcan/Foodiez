<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Foodiez Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#0f0f0f] text-white">

  <!-- 🔵 NAVBAR -->
  <nav class="flex justify-between items-center px-8 py-4 border-b border-gray-800">
    
    <!-- Logo -->
    <div class="flex items-center gap-2">
      <div class="bg-orange-500 p-2 rounded-lg">🍕</div>
      <h1 class="text-xl font-bold">FOODIEZ</h1>
    </div>

    <!-- Menu -->
    <div class="flex gap-6 text-gray-400">
      <button class="text-white border-b-2 border-orange-500 pb-1">Dashboard</button>
      <button class="hover:text-white">Commandes</button>
      <button class="hover:text-white">+ Nouvelle</button>
    </div>

    <!-- Status -->
    <div class="flex items-center gap-2 text-green-400 text-sm">
      <span class="w-2 h-2 bg-green-400 rounded-full"></span>
      Serveur actif
    </div>

  </nav>

  <!-- 🔵 CONTENT -->
  <main class="p-10">

    <!-- Title -->
    <div class="mb-10">
      <p class="text-gray-500 uppercase text-sm">Vue d'ensemble</p>
      <h2 class="text-4xl font-bold tracking-wide">TABLEAU DE BORD</h2>
    </div>

    <!-- ERROR STATE -->
    <div id="errorBox" class="flex flex-col items-center justify-center mt-20">

      <!-- Icon -->
      <div class="text-yellow-400 text-6xl mb-4">⚠️</div>

      <!-- Message -->
      <p class="text-gray-400 text-lg text-center">
        Erreur — JSON Server introuvable sur le port 3000.
      </p>

    </div>

  </main>

</body>
</html>
