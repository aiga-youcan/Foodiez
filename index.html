<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Foodiez | Restaurant Order Management</title>
  <meta name="description" content="Manage your restaurant orders in real-time.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./styles/main.css">
</head>
<body class="min-h-screen flex flex-col antialiased">

  <!-- Loader Banner -->
  <div id="global-loader" class="fixed top-0 left-0 right-0 z-50 h-1 hidden">
    <div class="h-full bg-indigo-500 animate-pulse w-full"></div>
  </div>

  <!-- Error Banner -->
  <div id="error-banner" class="fixed top-4 right-4 z-50 hidden fade-in max-w-sm w-full">
    <div class="bg-rose-500/10 border border-rose-500/30 backdrop-blur-md p-4 rounded-xl shadow-lg shadow-rose-900/20 flex items-start gap-3">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-rose-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      <div class="flex-1">
        <h3 class="text-rose-400 font-semibold mb-1">Error</h3>
        <p id="error-text" class="text-sm text-slate-300"></p>
      </div>
    </div>
  </div>

  <!-- Navigation -->
  <nav class="glass-panel sticky top-0 z-40 border-b border-slate-700/50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <div class="flex items-center gap-3">
          <div class="bg-indigo-600 text-white p-2 rounded-lg">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4" />
            </svg>
          </div>
          <span id="brand-name" class="font-bold text-xl tracking-tight text-white">Foodiez</span>
        </div>
        <div class="flex space-x-2">
          <button data-page="dashboard" class="nav-btn px-4 py-2 rounded-lg text-sm font-medium transition-colors">Dashboard</button>
          <button data-page="orders" class="nav-btn px-4 py-2 rounded-lg text-sm font-medium transition-colors">Orders</button>
          <button data-page="form" class="nav-btn px-4 py-2 rounded-lg text-sm font-medium transition-colors">New Order</button>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
    
    <!-- DASHBOARD -->
    <section id="page-dashboard" class="page-section fade-in">
      <div class="mb-8">
        <h1 class="text-3xl font-bold text-white tracking-tight mb-2">Overview</h1>
        <p class="text-slate-400">Live statistics of your restaurant's orders.</p>
      </div>
      <div id="dashboard-stats" class="grid grid-cols-2 md:grid-cols-5 gap-4">
        <!-- Stats rendered via JS -->
      </div>
    </section>

    <!-- ORDERS -->
    <section id="page-orders" class="page-section hidden fade-in">
      <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
        <div>
          <h1 class="text-3xl font-bold text-white tracking-tight mb-2">Orders Management</h1>
          <p class="text-slate-400">View and manage all customer orders.</p>
        </div>
        <!-- FILTER -->
        <div class="flex flex-wrap gap-2 p-1 bg-slate-800/50 rounded-lg border border-slate-700/50">
          <button data-filter="all" class="filter-btn px-4 py-1.5 rounded-md text-sm font-medium border transition-colors">All</button>
          <button data-filter="pending" class="filter-btn px-4 py-1.5 rounded-md text-sm font-medium border transition-colors">Pending</button>
          <button data-filter="accepted" class="filter-btn px-4 py-1.5 rounded-md text-sm font-medium border transition-colors">Accepted</button>
          <button data-filter="completed" class="filter-btn px-4 py-1.5 rounded-md text-sm font-medium border transition-colors">Completed</button>
          <button data-filter="rejected" class="filter-btn px-4 py-1.5 rounded-md text-sm font-medium border transition-colors">Rejected</button>
        </div>
      </div>
      <div id="orders-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <!-- Orders rendered via JS -->
      </div>
    </section>

    <!-- FORM -->
    <section id="page-form" class="page-section hidden fade-in max-w-2xl mx-auto">
      <div class="mb-8 text-center">
        <h1 class="text-3xl font-bold text-white tracking-tight mb-2">Create New Order</h1>
        <p class="text-slate-400">Enter customer details to add a new order manually.</p>
      </div>
      
      <form id="order-form" class="glass-panel p-8 rounded-2xl shadow-xl">
        <div class="space-y-6">
          <div>
            <label for="form-name" class="block text-sm font-medium text-slate-300 mb-2">Customer Name</label>
            <input type="text" id="form-name" required placeholder="e.g. John Doe" class="w-full bg-slate-800/50 border border-slate-600 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all">
          </div>
          <div>
            <label for="form-items" class="block text-sm font-medium text-slate-300 mb-2">Items (Comma separated)</label>
            <input type="text" id="form-items" required placeholder="e.g. 2x Pizza, 1x Cola" class="w-full bg-slate-800/50 border border-slate-600 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all">
          </div>
          <div>
            <label for="form-price" class="block text-sm font-medium text-slate-300 mb-2">Total Price (MAD)</label>
            <input type="number" id="form-price" required min="0" step="0.01" placeholder="e.g. 150.00" class="w-full bg-slate-800/50 border border-slate-600 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all">
          </div>
          <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-3 px-4 rounded-lg shadow-lg shadow-indigo-500/30 transition-all focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 focus:ring-offset-slate-900 mt-4">
            Submit Order
          </button>
        </div>
      </form>
    </section>

  </main>

  <!-- Footer -->
  <footer class="border-t border-slate-800 bg-slate-900/50 py-6 mt-auto">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
      <p id="footer-info" class="text-sm text-slate-500">Foodiez | Loading...</p>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="./js/state.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/ui.js"></script>
  <script src="./js/events.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
